<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>first Webpage</title>
    <!-- 独自のCSSファイルを読み込み -->
    <link rel="stylesheet" href="./style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="dashboard-container">
      <!-- 左サイドバー (固定) -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <a href="#" class="sidebar-home" data-tab="home">
            <span class="ri-home-line"></span>
            <span>Home</span>
          </a>
        </div>

        <!-- サイドバーにメニューを追加してください -->
        <ul>
          <li class="sidebar-menu-item tab-item" data-tab="converter">
            <span class="ri-scales-3-line"></span>
            <span>単位変換</span>
          </li>
          <!-- メニュー項目にTo doを追加してください -->
          <li class="sidebar-menu-item tab-item" data-tab="todolist">
            <span class="ri-book-line">To do</span>
          </li>
        </ul>
      </aside>

      <!-- 右メインコンテンツ (スクロール可) -->
      <main class="main-content">
        <!-- ホームセクション -->
        <section class="content-section" id="home">
          <header class="section-header">
            <div class="profile-circle">
              <span class="ri-user-smile-line"></span>
            </div>
            <h1 class="section-title">first web page へようこそ</h1>
            <p class="section-subtitle">
              こちらはProgate教材を基に作成したページです。
            </p>
          </header>
          <div class="section-body">
            <div class="section-description">
              <ul>
                <li>
                  単位変換ページでは、主要な単位(メートル、インチなど)の変換を行えます。
                </li>

                <li>
                  To do
                  ページでは今日やるべきことをページに追加、削除ができます。
                </li>
              </ul>
            </div>
          </div>
        </section>
        <!-- End ホームセクション -->
        <!-- start converter section-->
        <section class="content-section hidden" id="converter">
          <header class="section-header">
            <h1 class="section-title">単位変換サイト</h1>
          </header>
          <div class="section-body">
            <div class="converter-card">
              <form class="converter-form">
                <div class="form-group">
                  <label class="form-label">単位変換</label>
                </div>
                <div class="form-group">
                  <label class="form-label">変換する値を入力</label>
                  <input
                    type="number"
                    class="form-input converter-input"
                    value="1000"
                  />
                </div>
                <div class="form-row">
                  <div class="form-group">
                    <label class="form-label">From</label>
                    <select class="form-input converter-from"></select>
                  </div>
                  <div class="form-group">
                    <label class="form-label">To</label>
                    <select class="form-input converter-to"></select>
                  </div>
                </div>
                <div class="converter-result-container">
                  <div class="converter-result"></div>
                </div>
              </form>
            </div>
          </div>
        </section>
        <!-- To doセクション -->
        <section class="content-section hidden" id="todolist">
          <!-- ヘッダー-->
          <header class="section-header">
            <h1 class="section-title">To do リスト</h1>
          </header>
          <!-- body部分-->
          <div class="section-body">
            <!--追加ボタン-->
            <div class="add-todo-container">
              <button class="btn add-todo">
                <span>追加</span>
              </button>
            </div>
            <div class="modal hidden">
              <div class="modal-content">
                <h2 class="modal-title">Add To do</h2>
                <form id="word-form" class="modal-form">
                  <div class="form-group">
                    <label class="form-label">やること(To do)</label>
                    <input
                      type="text"
                      id="todo-input"
                      class="form-input"
                      required
                    />
                  </div>
                  <div class="form-group">
                    <label class="form-label">期日</label>
                    <input
                      type="date"
                      id="deadline-input"
                      class="form-input"
                      required
                    />
                  </div>
                  <div class="modal-actions">
                    <button type="button" class="cancel-word">Cancel</button>
                    <button type="submit" class="save-word">Save</button>
                  </div>
                </form>
              </div>
            </div>
            <!-- todo list-->
            <div class="todo-list"></div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
